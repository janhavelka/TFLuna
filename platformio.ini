[platformio]
src_dir = .
default_envs = firmware_esp32s3
test_dir = tests

[env]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/54.03.20/platform-espressif32.zip
extra_scripts =
  pre:scripts/generate_version.py
  pre:scripts/patch_asyncsd_div0_guard.py

monitor_speed = 115200
monitor_rts = 0
monitor_dtr = 0
monitor_filters = send_on_enter, esp32_exception_decoder, colorize
monitor_eol = LF
monitor_echo = yes

upload_speed = 921600

build_flags =
  -Wall
  -Wextra
  -Werror=return-type
  -Iinclude
  -Isrc
  -DCORE_DEBUG_LEVEL=0
  -DLOG_LEVEL=2
  -DTFLUNACTRL_ENABLE_WEB=1
  -DTFLUNACTRL_ENABLE_DISPLAY=0
  -DSTATUSLED_BACKEND_IDF5_WS2812=1

lib_deps =
  bblanchon/ArduinoJson@^6.21.3
  https://github.com/ESP32Async/ESPAsyncWebServer.git#v3.9.6
  https://github.com/ESP32Async/AsyncTCP.git#v3.4.10
  https://github.com/budryerson/TFMini-Plus.git#1.5.0
  https://github.com/janhavelka/BME280.git#v1.2.1
  https://github.com/janhavelka/SHT3x-main.git#v1.4.0
  https://github.com/janhavelka/RV3032-C7.git#v1.3.0
  https://github.com/janhavelka/SSD1315.git#v1.1.0
  https://github.com/janhavelka/AsyncSD.git#v1.3.0
  https://github.com/janhavelka/SystemChrono.git#v1.2.0
  https://github.com/janhavelka/StatusLED.git#v1.3.0

debug_tool = esp-prog
debug_init_break = tbreak setup

[env:esp32s3dev]
extends = env
board = esp32-s3-devkitc-1
framework = arduino
board_build.flash_size = 4MB
board_upload.flash_size = 4MB
board_build.partitions = huge_app.csv
build_unflags =
  -DTFLUNACTRL_ENABLE_DISPLAY=0
build_flags =
  ${env.build_flags}
  -DTFLUNACTRL_ENABLE_DISPLAY=1
  -DARDUINO_LOOP_STACK_SIZE=16384
  -DBOARD_HAS_PSRAM
  -mfix-esp32-psram-cache-issue
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1

[env:esp32s2dev]
extends = env
board = esp32-s2-saola-1
framework = arduino
board_build.flash_size = 4MB
board_upload.flash_size = 4MB
board_build.partitions = huge_app.csv
build_flags =
  ${env.build_flags}
  -DBOARD_HAS_PSRAM
  -DARDUINO_USB_MODE=0
  -DARDUINO_USB_CDC_ON_BOOT=1

[env:firmware_esp32s3]
extends = env:esp32s3dev
framework = arduino
build_src_filter =
  -<*>
  +<src/**>
  +<include/**>

[env:firmware_esp32s2]
extends = env:esp32s2dev
framework = arduino
build_src_filter =
  -<*>
  +<src/**>
  +<include/**>

[env:native]
platform = native
test_framework = unity
test_build_src = true
lib_deps =
  bblanchon/ArduinoJson@^6.21.3
build_flags =
  -std=gnu++17
  -Iinclude
  -Isrc
build_src_filter =
  -<*>
  +<src/core/**>
  +<src/control/**>
  +<src/devices/**>
  +<src/i2c/**>
  +<src/logging/**>
  +<src/settings/**>
  +<src/utils/**>
  +<src/web/**>
