[platformio]
src_dir = .
default_envs = firmware_esp32s2
test_dir = tests

[env]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/54.03.20/platform-espressif32.zip
extra_scripts =
  pre:scripts/generate_version.py
  pre:scripts/patch_asyncsd_div0_guard.py

monitor_speed = 115200
monitor_rts = 0
monitor_dtr = 0
monitor_filters = send_on_enter, esp32_exception_decoder, colorize
monitor_eol = LF
monitor_echo = yes

upload_speed = 921600

build_flags =
  -Wall
  -Wextra
  -Werror=return-type
  -Iinclude
  -Isrc
  -DCORE_DEBUG_LEVEL=0
  -DLOG_LEVEL=2
  -DCO2CONTROL_ENABLE_WEB=1
  -DCO2CONTROL_ENABLE_DISPLAY=0
  -DSTATUSLED_BACKEND_IDF5_WS2812=1
  ; Production monitoring (uncomment as needed):
  ; -DCONFIG_FREERTOS_USE_TRACE_FACILITY=1
  ; -DCONFIG_FREERTOS_USE_STATS_FORMATTING_FUNCTIONS=1
  ; -DCONFIG_ESP_TASK_WDT_CHECK_IDLE_TASK_CPU0=y

lib_deps =
  bblanchon/ArduinoJson@^6.21.3
  https://github.com/ESP32Async/ESPAsyncWebServer.git#v3.9.6
  https://github.com/ESP32Async/AsyncTCP.git#v3.4.10
  https://github.com/janhavelka/BME280.git#v1.2.1
  https://github.com/janhavelka/SHT3x-main.git#v1.4.0
  https://github.com/janhavelka/RV3032-C7.git#v1.3.0
  https://github.com/janhavelka/SSD1315.git#v1.1.0
  https://github.com/janhavelka/EE871-E2.git#v0.3.0
  https://github.com/janhavelka/AsyncSD.git#v1.3.0
  https://github.com/janhavelka/SystemChrono.git#v1.2.0
  https://github.com/janhavelka/StatusLED.git#v1.3.0

; ESP-PROG / ESP-PROG2
debug_tool = esp-prog
debug_init_break = tbreak setup

; -------------------------
; ESP32-S3 shared config
; -------------------------
[env:esp32s3dev]
extends = env
board = esp32-s3-devkitc-1
framework = arduino
board_build.flash_size = 4MB
board_upload.flash_size = 4MB
board_build.partitions = huge_app.csv
build_unflags =
  -DCO2CONTROL_ENABLE_DISPLAY=0
build_flags =
  ${env.build_flags}
  ; This S3 board revision has working SSD1315 OLED on I2C.
  -DCO2CONTROL_ENABLE_DISPLAY=1
  ; S3 loop path (web + async SD + diagnostics) needs more than default 8 KB.
  -DARDUINO_LOOP_STACK_SIZE=16384
  -DBOARD_HAS_PSRAM
  -mfix-esp32-psram-cache-issue
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1

; -------------------------
; ESP32-S2 shared config
; -------------------------
[env:esp32s2dev]
extends = env
board = esp32-s2-saola-1
framework = arduino
board_build.flash_size = 4MB
board_upload.flash_size = 4MB
board_build.partitions = huge_app.csv
build_flags =
  ${env.build_flags}
  -DBOARD_HAS_PSRAM
  -DARDUINO_USB_MODE=0
  -DARDUINO_USB_CDC_ON_BOOT=1

; -------------------------
; Firmware environments
; -------------------------

; CO2Control firmware (S2)
[env:firmware_esp32s2]
extends = env:esp32s2dev
framework = arduino
build_src_filter =
  -<*>
  +<src/**>
  +<include/**>

; CO2Control firmware (S3)
[env:firmware_esp32s3]
extends = env:esp32s3dev
framework = arduino
build_src_filter =
  -<*>
  +<src/**>
  +<include/**>

; Native unit tests (logic only)
[env:native]
platform = native
test_framework = unity
test_build_src = true
lib_deps =
  bblanchon/ArduinoJson@^6.21.3
build_flags =
  -std=gnu++17
  -Iinclude
  -Isrc
build_src_filter =
  -<*>
  +<src/core/**>
  +<src/control/**>
  +<src/devices/**>
  +<src/i2c/**>
  +<src/logging/**>
  +<src/settings/**>
  +<src/utils/**>
  +<src/web/**>
